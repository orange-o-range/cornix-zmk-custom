## WS2812 indicator driver (consumed by the stage-B self-built widget).
## In Zephyr 4.x the WS2812 strip is split per-bus; the SPI driver is
## what Cornix uses (see ws2812@0 under &spi3 in cornix.dtsi).
## WS2812_STRIP_SPI auto-enables when the DT has a status=okay
## worldsemi,ws2812-spi node and also selects SPI for us.
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y
CONFIG_ZMK_EXT_POWER=y

## Fix for issue #14 (see src/bt_ctlr_assert.c): routing the BLE controller's
## LL_ASSERT() to an app handler instead of the default k_oops->halt keeps the
## split peripheral from freezing when the central abruptly loses power. Verified
## by a clean A/B on hardware (USB and battery). REBOOT is for the handler's
## recovery path.
CONFIG_BT_CTLR_ASSERT_HANDLER=y
CONFIG_REBOOT=y
